<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verdure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --soil:    #2a1f14;
    --bark:    #3d2b1a;
    --moss:    #4a5e3a;
    --leaf:    #6b8f4e;
    --sprout:  #9bbf73;
    --bloom:   #c8e6a0;
    --petal:   #e8f5d0;
    --rust:    #b05c2a;
    --amber:   #d4892a;
    --fog:     #c2c9b8;
    --panel:   rgba(26,20,12,0.94);
    --border:  rgba(80,65,40,0.6);
    --text:    #d8cdb8;
    --dim:     #7a7060;
    --bright:  #eee8d8;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'DM Sans', sans-serif;
    --font-mono:    'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a140c;
    font-family: var(--font-body);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── LOADING SCREEN ── */
  #loadScreen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--soil);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  }
  #loadScreen h1 {
    font-family: var(--font-display);
    font-size: 2.8rem; color: var(--sprout);
    letter-spacing: 0.06em;
  }
  #loadScreen p { font-family: var(--font-mono); font-size: 0.75rem; color: var(--dim); }
  .load-bar-wrap { width: 200px; height: 4px; background: var(--bark); border-radius: 2px; overflow: hidden; }
  .load-bar { height: 100%; background: var(--leaf); border-radius: 2px; transition: width 0.3s; width: 0%; }

  /* ── WORLD FILE INPUT ── */
  #worldPickWrap {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    position: fixed; inset: 0; background: var(--soil); z-index: 9998;
    justify-content: center;
  }
  #worldPickWrap h1 { font-family: var(--font-display); font-size: 2.2rem; color: var(--sprout); }
  #worldPickWrap p { font-size: 0.88rem; color: var(--dim); text-align: center; max-width: 340px; line-height: 1.6; }
  .pick-btn {
    background: var(--moss); border: none; color: var(--petal);
    font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.08em;
    padding: 10px 28px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .pick-btn:hover { background: var(--leaf); }

  /* ── GAME WRAPPER ── */
  #gameWrap {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── MAP STAGE ── */
  #mapStage {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  #mapBg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  #mapBgPlaceholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: repeating-linear-gradient(45deg,#2a2018 0,#2a2018 10px,#201810 10px,#201810 20px);
    font-size: 4rem; color: rgba(255,255,255,0.06);
    pointer-events: none;
  }

  /* ── OBJECTS ── */
  .game-object {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: filter 0.12s;
  }
  .game-object:hover .obj-visual { filter: brightness(1.3); }
  .game-object.in-range .obj-visual { filter: drop-shadow(0 0 6px var(--sprout)); }
  .game-object.not-in-range { cursor: default; }
  .obj-visual {
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: transform 0.1s;
  }
  .game-object:hover .obj-visual { transform: scale(1.08); }
  .obj-icon-inner {
    background: rgba(26,20,12,0.7);
    border: 2px solid rgba(80,65,40,0.5);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }
  .obj-sprite-img {
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .obj-label {
    font-size: 0.6rem;
    font-family: var(--font-mono);
    background: rgba(0,0,0,0.75);
    color: var(--bloom);
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .game-object:hover .obj-label, .game-object.in-range .obj-label { opacity: 1; }

  /* ── MASK OVERLAYS ── */
  #maskOverlay {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  /* ── TRANSITION OVERLAY ── */
  #transitionOverlay {
    position: absolute; inset: 0;
    background: #1a140c;
    opacity: 0; pointer-events: none;
    z-index: 100;
    transition: opacity 0.35s;
  }
  #transitionOverlay.fade-in { opacity: 1; pointer-events: all; }

  /* ── ACTION POPUP ── */
  #actionPopup {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    display: none;
    flex-direction: column;
    gap: 4px;
    z-index: 80;
    min-width: 140px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }
  #actionPopup.open { display: flex; }
  .action-btn {
    background: none; border: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.82rem;
    padding: 6px 12px;
    text-align: left;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    display: flex; align-items: center; gap: 8px;
  }
  .action-btn:hover { background: rgba(107,143,78,0.2); color: var(--bright); }
  .action-btn .action-icon { font-size: 1rem; }
  .action-btn.disabled { color: var(--dim); cursor: not-allowed; }
  .action-btn.disabled:hover { background: none; color: var(--dim); }
  .action-sep { height: 1px; background: var(--border); margin: 2px 0; }
  .action-popup-title {
    font-family: var(--font-mono); font-size: 0.62rem;
    color: var(--dim); padding: 2px 12px 4px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* ── ANIMATIONS ── */
  @keyframes vd-sway  { 0%,100%{transform:translate(-50%,-50%) rotate(-4deg)}50%{transform:translate(-50%,-50%) rotate(4deg)} }
  @keyframes vd-jitter{ 0%,100%{transform:translate(-50%,-50%) translate(0,0)}25%{transform:translate(-50%,-50%) translate(-2px,1px)}50%{transform:translate(-50%,-50%) translate(2px,-1px)}75%{transform:translate(-50%,-50%) translate(-1px,2px)} }
  @keyframes vd-pop   { 0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.12)} }
  @keyframes vd-float { 0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-6px)} }
  @keyframes vd-glow  { 0%,100%{opacity:1;filter:brightness(1)}50%{opacity:0.65;filter:brightness(1.7)} }
  .anim-sway  { animation: vd-sway   3s ease-in-out infinite; }
  .anim-jitter{ animation: vd-jitter 0.3s linear infinite; }
  .anim-pop   { animation: vd-pop    1.8s ease-in-out infinite; }
  .anim-float { animation: vd-float  2.5s ease-in-out infinite; }
  .anim-glow  { animation: vd-glow   2s ease-in-out infinite; }

  /* ── HUD ── */
  #hud {
    flex-shrink: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    height: 86px;
    backdrop-filter: blur(8px);
    position: relative;
    z-index: 20;
  }

  /* XP / Level */
  .hud-player {
    padding: 10px 16px;
    display: flex; flex-direction: column; justify-content: center; gap: 5px;
    border-right: 1px solid var(--border);
    min-width: 130px;
  }
  .hud-player-name {
    font-family: var(--font-display);
    font-size: 0.9rem; color: var(--bright);
  }
  .hud-level {
    font-family: var(--font-mono);
    font-size: 0.65rem; color: var(--amber);
    letter-spacing: 0.1em;
  }
  .xp-bar-wrap {
    height: 4px; background: var(--bark); border-radius: 2px; overflow: hidden;
  }
  .xp-bar {
    height: 100%; background: linear-gradient(90deg,var(--leaf),var(--sprout));
    border-radius: 2px; transition: width 0.5s;
  }

  /* Inventory */
  .hud-inventory {
    flex: 1;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto;
  }
  .hud-inventory::-webkit-scrollbar { height: 3px; }
  .hud-inventory::-webkit-scrollbar-thumb { background: var(--border); }
  .inv-label {
    font-family: var(--font-mono); font-size: 0.6rem;
    color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase;
    flex-shrink: 0; writing-mode: vertical-lr; transform: rotate(180deg);
  }
  .inv-slot {
    width: 52px; height: 52px; flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px; position: relative; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .inv-slot:hover { border-color: var(--leaf); background: rgba(107,143,78,0.12); }
  .inv-slot.active { border-color: var(--sprout); background: rgba(107,143,78,0.2); }
  .inv-slot-icon { font-size: 1.4rem; line-height: 1; }
  .inv-slot-img { width: 32px; height: 32px; object-fit: contain; image-rendering: pixelated; }
  .inv-slot-name { font-size: 0.5rem; font-family: var(--font-mono); color: var(--dim); text-align: center; line-height: 1.2; max-width: 48px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .inv-slot-qty {
    position: absolute; bottom: 2px; right: 4px;
    font-family: var(--font-mono); font-size: 0.55rem;
    color: var(--amber); font-weight: 500;
  }
  .inv-empty { font-family: var(--font-mono); font-size: 0.72rem; color: var(--dim); padding: 0 8px; }

  /* Map info */
  .hud-map-info {
    padding: 10px 16px;
    display: flex; flex-direction: column; justify-content: center; gap: 4px;
    border-left: 1px solid var(--border);
    min-width: 140px; text-align: right;
  }
  .hud-map-name {
    font-family: var(--font-display); font-size: 0.88rem; color: var(--bright);
  }
  .hud-map-meta {
    font-family: var(--font-mono); font-size: 0.62rem; color: var(--dim);
    letter-spacing: 0.06em;
  }
  .blight-bar-wrap { height: 4px; background: var(--bark); border-radius: 2px; overflow: hidden; margin-top: 2px; }
  .blight-bar { height: 100%; background: linear-gradient(90deg,var(--rust),#8a3020); border-radius: 2px; transition: width 0.5s; }

  /* HUD buttons */
  .hud-actions {
    padding: 10px 12px;
    display: flex; flex-direction: column; justify-content: center; gap: 5px;
    border-left: 1px solid var(--border);
  }
  .hud-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-mono);
    font-size: 0.65rem; letter-spacing: 0.08em;
    padding: 5px 10px; border-radius: 3px; cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  .hud-btn:hover { background: rgba(107,143,78,0.15); border-color: var(--leaf); color: var(--bright); }

  /* ── DIALOG UI ── */
  #dialogBox {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 16px 20px 20px;
    display: none;
    flex-direction: column; gap: 12px;
    z-index: 90;
    backdrop-filter: blur(8px);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  #dialogBox.open { display: flex; }
  .dialog-speaker {
    font-family: var(--font-mono); font-size: 0.7rem;
    color: var(--sprout); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .dialog-text {
    font-size: 0.95rem; line-height: 1.6; color: var(--bright);
    font-family: var(--font-display); font-style: italic;
  }
  .dialog-choices { display: flex; flex-direction: column; gap: 6px; }
  .dialog-choice {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 14px;
    font-size: 0.85rem; color: var(--text);
    cursor: pointer; transition: all 0.12s;
    text-align: left;
  }
  .dialog-choice:hover { background: rgba(107,143,78,0.18); border-color: var(--leaf); color: var(--bright); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: var(--moss); color: var(--petal);
    padding: 7px 20px; border-radius: 20px;
    font-family: var(--font-mono); font-size: 0.75rem;
    z-index: 500; pointer-events: none;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.xp { background: var(--amber); }
  #toast.error { background: var(--rust); }

  /* ── GROW TIMER BADGE ── */
  .grow-badge {
    position: absolute; top: -6px; right: -6px;
    background: var(--amber); color: #1a140c;
    font-family: var(--font-mono); font-size: 0.5rem;
    padding: 1px 4px; border-radius: 8px;
    pointer-events: none; z-index: 2;
    white-space: nowrap;
  }

  /* ── MAP NAME BANNER ── */
  #mapBanner {
    position: absolute; top: 16px; left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 6px 20px; border-radius: 20px;
    font-family: var(--font-display); font-size: 1rem;
    color: var(--bright); z-index: 30;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  #mapBanner.show { opacity: 1; }

  /* Scrollbars */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadScreen">
  <h1>🌿 Verdure</h1>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
  <p id="loadMsg">Loading world…</p>
</div>

<!-- WORLD FILE PICKER (shown if no world.json found) -->
<div id="worldPickWrap" style="display:none">
  <h1>🌿 Verdure</h1>
  <p>Load a <code>world.json</code> exported from the World Editor to begin.</p>
  <button class="pick-btn" onclick="document.getElementById('worldFileInput').click()">📂 Open world.json</button>
  <input type="file" id="worldFileInput" accept=".json" style="display:none" onchange="loadWorldFile(event)">
  <p style="font-size:0.75rem;margin-top:8px">Or place <code>world.json</code> in the same folder as this file.</p>
</div>

<!-- MAIN GAME -->
<div id="gameWrap">

  <!-- MAP STAGE -->
  <div id="mapStage">
    <img id="mapBg" src="" style="display:none">
    <div id="mapBgPlaceholder">🌿</div>
    <svg id="maskOverlay"></svg>
    <div id="objectLayer"></div>
    <div id="mapBanner"></div>
    <div id="transitionOverlay"></div>
    <div id="actionPopup"></div>
    <div id="dialogBox"></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-player">
      <div class="hud-player-name" id="hudPlayerName">Gardener</div>
      <div class="hud-level" id="hudLevel">LVL 1 · 0 XP</div>
      <div class="xp-bar-wrap"><div class="xp-bar" id="xpBar" style="width:0%"></div></div>
    </div>
    <div class="hud-inventory">
      <div class="inv-label">Inventory</div>
      <div id="invSlots"></div>
    </div>
    <div class="hud-map-info">
      <div class="hud-map-name" id="hudMapName">—</div>
      <div class="hud-map-meta" id="hudMapMeta">—</div>
      <div class="blight-bar-wrap"><div class="blight-bar" id="blightBar" style="width:0%"></div></div>
    </div>
    <div class="hud-actions">
      <button class="hud-btn" onclick="toggleLabels()">🏷 Labels</button>
      <button class="hud-btn" onclick="toggleMasks()">🗺 Masks</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// WORLD & PLAYER STATE
// ══════════════════════════════════════════════════════
let world = null;
let player = null;
let currentMapId = null;
let selectedObjId = null;
let showLabels = true;
let showMasksOverlay = false;
let growTimerInterval = null;

const CATEGORY_ICONS = {
  tool:'🛠', plant:'🌿', building:'🏚', creature:'🐝',
  hidden_object:'🔍', portal:'🚪', decoration:'🪨', hazard:'⚠'
};

const MASK_COLORS = {
  no_plant:     'rgba(220,60,60,0.22)',
  no_walk:      'rgba(60,60,220,0.22)',
  interact_only:'rgba(220,160,40,0.22)',
  plant_only:   'rgba(60,160,60,0.22)',
  water:        'rgba(40,160,220,0.22)'
};

const XP_PER_LEVEL = 100;
const XP_REWARDS = { collect:10, harvest:15, clear_hazard:12, grow:5, dialog:8, plant:10 };

// ══════════════════════════════════════════════════════
// PLAYER PERSISTENCE
// ══════════════════════════════════════════════════════
function defaultPlayer() {
  return {
    name: 'Gardener',
    level: 1, xp: 0,
    inventory: [],
    map_states: {},   // { map_id: { obj_id: { state, collected, planted_at } } }
    visited_maps: [],
    active_map: null
  };
}

function savePlayer() {
  localStorage.setItem('verdure_player', JSON.stringify(player));
}

function loadPlayer() {
  try {
    const saved = localStorage.getItem('verdure_player');
    player = saved ? JSON.parse(saved) : defaultPlayer();
  } catch(e) { player = defaultPlayer(); }
}

// ══════════════════════════════════════════════════════
// WORLD LOADING
// ══════════════════════════════════════════════════════
async function init() {
  setLoad(10, 'Loading player…');
  loadPlayer();
  setLoad(30, 'Loading world…');

  // Try fetch world.json from same directory
  try {
    const res = await fetch('../data/world.json');
    if (res.ok) {
      world = await res.json();
      setLoad(80, 'Building world…');
      startGame();
      return;
    }
  } catch(e) {}

  // Try same-dir world.json
  try {
    const res = await fetch('world.json');
    if (res.ok) {
      world = await res.json();
      setLoad(80, 'Building world…');
      startGame();
      return;
    }
  } catch(e) {}

  // Fallback: ask user to pick file
  setLoad(100, 'Ready');
  setTimeout(() => {
    document.getElementById('loadScreen').style.display = 'none';
    document.getElementById('worldPickWrap').style.display = 'flex';
  }, 400);
}

function setLoad(pct, msg) {
  document.getElementById('loadBar').style.width = pct + '%';
  document.getElementById('loadMsg').textContent = msg;
}

function loadWorldFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      world = JSON.parse(ev.target.result);
      document.getElementById('worldPickWrap').style.display = 'none';
      document.getElementById('loadScreen').style.display = 'flex';
      setLoad(80, 'Building world…');
      startGame();
    } catch(err) { alert('Invalid world.json: ' + err.message); }
  };
  reader.readAsText(file);
}

function startGame() {
  setLoad(95, 'Entering world…');
  if (!world?.maps?.length) { alert('No maps found in world.json'); return; }

  // Find entry map
  const startMapId = player.active_map && world.maps.find(m=>m.id===player.active_map)
    ? player.active_map
    : world.maps[0].id;

  setTimeout(() => {
    document.getElementById('loadScreen').style.display = 'none';
    document.getElementById('gameWrap').style.display = 'flex';
    enterMap(startMapId, false);
    updateHUD();
    startGrowTimer();
  }, 500);
}

// ══════════════════════════════════════════════════════
// MAP RENDERING
// ══════════════════════════════════════════════════════
function enterMap(mapId, animate = true) {
  const map = world.maps.find(m => m.id === mapId);
  if (!map) { showToast('Map not found', 'error'); return; }

  if (animate) {
    const overlay = document.getElementById('transitionOverlay');
    overlay.classList.add('fade-in');
    setTimeout(() => {
      doEnterMap(map);
      overlay.classList.remove('fade-in');
    }, 380);
  } else {
    doEnterMap(map);
  }
}

function doEnterMap(map) {
  currentMapId = map.id;
  player.active_map = map.id;
  if (!player.visited_maps.includes(map.id)) player.visited_maps.push(map.id);
  if (!player.map_states[map.id]) player.map_states[map.id] = {};
  savePlayer();
  closeActionPopup();
  closeDialog();

  // Background
  const bg = document.getElementById('mapBg');
  const placeholder = document.getElementById('mapBgPlaceholder');
  if (map.background) {
    bg.src = map.background; bg.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    bg.style.display = 'none'; placeholder.style.display = 'flex';
  }

  renderObjects(map);
  renderMaskOverlay(map);
  updateHUD();
  showMapBanner(map.name);
}

function renderObjects(map) {
  const layer = document.getElementById('objectLayer');
  layer.innerHTML = '';

  const objState = player.map_states[map.id] || {};
  const sorted = [...(map.objects||[])].sort((a,b)=>(a.z_order||0)-(b.z_order||0));

  sorted.forEach(obj => {
    const entity = world.entities?.find(e => e.id === obj.entity_id);
    if (!entity && !isPortalObj(obj)) return;

    const state = objState[obj.id]?.state || obj.state || 'idle';
    const collected = objState[obj.id]?.collected || false;

    // Don't render collected non-respawning items
    if (collected && entity && !entity.respawn) return;

    const size = obj.size || 48;
    const label = obj.label || entity?.name || (isPortalObj(obj) ? '🚪 Portal' : 'Object');
    const rotation = obj.rotation || 0;
    const animClass = obj.animation && obj.animation !== 'none' ? `anim-${obj.animation}` : '';

    const el = document.createElement('div');
    el.className = `game-object ${animClass}`;
    el.dataset.objId = obj.id;
    el.style.left = (obj.x * 100) + '%';
    el.style.top = (obj.y * 100) + '%';
    el.style.zIndex = obj.z_order || 10;
    if (rotation) el.style.transform = `translate(-50%,-50%) rotate(${rotation}deg)`;

    // Visual
    const visual = document.createElement('div');
    visual.className = 'obj-visual';
    if (entity?.sprite) {
      const img = document.createElement('img');
      img.className = 'obj-sprite-img';
      img.src = entity.sprite;
      img.style.width = size + 'px'; img.style.height = size + 'px';
      img.draggable = false;
      visual.appendChild(img);
    } else {
      const icon = document.createElement('div');
      icon.className = 'obj-icon-inner';
      icon.style.width = size + 'px'; icon.style.height = size + 'px';
      icon.style.fontSize = Math.round(size * 0.5) + 'px';
      icon.textContent = entity ? (CATEGORY_ICONS[entity.category]||'📦') : '🚪';
      visual.appendChild(icon);
    }

    // Grow timer badge
    const planted = objState[obj.id]?.planted_at;
    if (planted && entity?.grow_time_hours > 0) {
      const remainMs = (entity.grow_time_hours * 3600000 / (entity.growth_speed_multiplier||1)) - (Date.now() - planted);
      if (remainMs > 0) {
        const badge = document.createElement('div');
        badge.className = 'grow-badge';
        badge.dataset.plantedAt = planted;
        badge.dataset.growMs = entity.grow_time_hours * 3600000 / (entity.growth_speed_multiplier||1);
        badge.textContent = formatDuration(remainMs);
        visual.style.position = 'relative';
        visual.appendChild(badge);
      }
    }

    // State indicator dot
    if (state && state !== 'idle') {
      const dot = document.createElement('div');
      dot.style.cssText = 'position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--sprout);border:1px solid var(--soil);pointer-events:none';
      visual.style.position = 'relative';
      visual.appendChild(dot);
    }

    el.appendChild(visual);

    // Label
    const labelEl = document.createElement('div');
    labelEl.className = 'obj-label';
    labelEl.textContent = showLabels ? label : '';
    el.appendChild(labelEl);

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      handleObjectClick(obj, entity, el);
    });

    layer.appendChild(el);
  });
}

function renderMaskOverlay(map) {
  const svg = document.getElementById('maskOverlay');
  svg.innerHTML = '';
  if (!showMasksOverlay || !map.masks?.length) return;
  const stage = document.getElementById('mapStage');
  const w = stage.offsetWidth, h = stage.offsetHeight;
  map.masks.forEach(mask => {
    const color = MASK_COLORS[mask.type] || 'rgba(180,100,100,0.2)';
    const pts = mask.points.map(p=>`${p.x*w},${p.y*h}`).join(' ');
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',pts); poly.setAttribute('fill',color);
    poly.setAttribute('stroke','rgba(255,255,255,0.2)'); poly.setAttribute('stroke-width','1');
    svg.appendChild(poly);
  });
}

function isPortalObj(obj) {
  if (obj.type === 'portal') return true;
  const entity = world.entities?.find(e => e.id === obj.entity_id);
  return entity?.category === 'portal';
}

function showMapBanner(name) {
  const b = document.getElementById('mapBanner');
  b.textContent = name; b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════════════
// OBJECT INTERACTION
// ══════════════════════════════════════════════════════
function handleObjectClick(obj, entity, el) {
  const map = world.maps.find(m => m.id === currentMapId);
  if (!map) return;

  // Portal — just traverse immediately
  if (isPortalObj(obj)) {
    const portal = (map.portals||[]).find(p => p.id === obj.portal_id);
    const targetId = portal?.to || entity?.interactions?.[0]?.dialog_id;
    if (portal?.to) {
      if ((player.level||1) < (portal.requires_level||0)) {
        showToast(`Requires level ${portal.requires_level}`, 'error'); return;
      }
      enterMap(portal.to);
    } else { showToast('Portal not linked yet', 'error'); }
    return;
  }

  if (!entity) return;

  // Check if within trigger radius
  const inRange = checkTriggerRadius(obj, el);
  if (!inRange) { showToast('Get closer to interact', 'error'); return; }

  // Build interaction menu
  const interactions = entity.interactions || [];
  if (!interactions.length && !entity.collectible) return;

  openActionPopup(obj, entity, el, interactions);
}

function checkTriggerRadius(obj, el) {
  // In a point-and-click web game, all objects are accessible — radius is always satisfied
  return true;
}

function openActionPopup(obj, entity, el, interactions) {
  closeActionPopup();
  const popup = document.getElementById('actionPopup');
  const rect = el.getBoundingClientRect();
  const stageRect = document.getElementById('mapStage').getBoundingClientRect();

  let html = `<div class="action-popup-title">${entity.name}</div>`;
  html += `<div class="action-sep"></div>`;

  const objState = player.map_states[currentMapId] || {};
  const currentState = objState[obj.id]?.state || obj.state || 'idle';

  // Show state
  html += `<div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--dim);padding:2px 12px">State: ${currentState}</div>`;
  html += `<div class="action-sep"></div>`;

  interactions.forEach((ix, i) => {
    const hasReq = ix.requires_entity_id && !hasItemInInventory(ix.requires_entity_id);
    const reqEntity = ix.requires_entity_id ? world.entities?.find(e=>e.id===ix.requires_entity_id) : null;
    const triggerIcon = {click:'👆',collect:'🤲',water:'💧',harvest:'🌾',inspect:'🔍',plant:'🌱'}[ix.trigger]||'▶';
    const disabled = hasReq ? ' disabled' : '';
    const title = hasReq ? ` title="Requires: ${reqEntity?.name||ix.requires_entity_id}"` : '';
    html += `<button class="action-btn${disabled}"${title} onclick="fireInteraction('${obj.id}','${ix.trigger}',${i})">
      <span class="action-icon">${triggerIcon}</span>
      ${ix.trigger.charAt(0).toUpperCase()+ix.trigger.slice(1)}
      ${hasReq ? `<span style="font-size:0.65rem;color:var(--rust)">🔒</span>` : ''}
    </button>`;
  });

  // Quick collect if collectible and no collect interaction defined
  if (entity.collectible && !interactions.find(ix=>ix.trigger==='collect')) {
    html += `<button class="action-btn" onclick="quickCollect('${obj.id}')"><span class="action-icon">🤲</span> Collect</button>`;
  }

  // Close
  html += `<div class="action-sep"></div>`;
  html += `<button class="action-btn" onclick="closeActionPopup()"><span class="action-icon">✕</span> Close</button>`;

  popup.innerHTML = html;

  // Position popup above the object
  let left = rect.left - stageRect.left + rect.width/2 - 70;
  let top = rect.top - stageRect.top - 10;
  left = Math.max(4, Math.min(left, stageRect.width - 148));
  top = Math.max(4, top);
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.classList.add('open');
}

function closeActionPopup() {
  document.getElementById('actionPopup').classList.remove('open');
  document.getElementById('actionPopup').innerHTML = '';
}

document.getElementById('mapStage').addEventListener('click', function(e) {
  if (e.target === this || e.target.id === 'mapBg' || e.target.id === 'mapBgPlaceholder') {
    closeActionPopup();
  }
});

// ══════════════════════════════════════════════════════
// INTERACTION FIRING
// ══════════════════════════════════════════════════════
function fireInteraction(objId, trigger, ixIndex) {
  closeActionPopup();
  const map = world.maps.find(m => m.id === currentMapId);
  const obj = (map?.objects||[]).find(o => o.id === objId);
  const entity = world.entities?.find(e => e.id === obj?.entity_id);
  if (!obj || !entity) return;

  const ix = entity.interactions[ixIndex];
  if (!ix) return;

  // Check tool requirement
  if (ix.requires_entity_id && !hasItemInInventory(ix.requires_entity_id)) {
    const req = world.entities?.find(e=>e.id===ix.requires_entity_id);
    showToast(`Need ${req?.name||'required tool'} to do this`, 'error'); return;
  }

  // Play interaction sound
  if (ix.sound) { try { new Audio(ix.sound).play(); } catch(e) {} }

  // Execute action
  switch(ix.action) {
    case 'collect':   doCollect(obj, entity, ix); break;
    case 'grow':      doGrow(obj, entity, ix); break;
    case 'harvest':   doHarvest(obj, entity, ix); break;
    case 'reveal':    doReveal(obj, entity, ix); break;
    case 'transform': doTransform(obj, entity, ix); break;
    case 'reward':    doReward(obj, entity, ix); break;
    case 'dialog':    openDialog(ix.dialog_id, obj); break;
    case 'plant':     doPlant(obj, entity, ix); break;
    case 'unlock':    showToast('Unlocked!'); giveXP(20, 'unlock'); break;
    case 'gift':      showToast('You received a gift!'); giveXP(5, 'gift'); break;
    default:          showToast(ix.action); break;
  }
}

function quickCollect(objId) {
  closeActionPopup();
  const map = world.maps.find(m=>m.id===currentMapId);
  const obj = (map?.objects||[]).find(o=>o.id===objId);
  const entity = world.entities?.find(e=>e.id===obj?.entity_id);
  if (!obj || !entity) return;
  doCollect(obj, entity, {reward:''});
}

function doCollect(obj, entity, ix) {
  if (!player.map_states[currentMapId]) player.map_states[currentMapId] = {};
  player.map_states[currentMapId][obj.id] = {
    ...player.map_states[currentMapId][obj.id],
    state: 'collected', collected: true, collected_at: Date.now()
  };
  addToInventory(obj.entity_id, 1);
  if (ix.reward) giveReward(ix.reward);
  giveXP(entity.category === 'hazard' ? XP_REWARDS.clear_hazard : XP_REWARDS.collect, 'collect');
  savePlayer();
  const map = world.maps.find(m=>m.id===currentMapId);
  renderObjects(map);
  showToast(`Collected ${entity.name}`);
}

function doGrow(obj, entity, ix) {
  if (!player.map_states[currentMapId]) player.map_states[currentMapId] = {};
  const objState = player.map_states[currentMapId][obj.id] || {};
  const states = entity.states || [{id:'idle'}];
  const currentState = objState.state || obj.state || states[0].id;
  const ci = states.findIndex(s=>s.id===currentState);
  const nextState = states[Math.min(ci+1, states.length-1)];

  player.map_states[currentMapId][obj.id] = {
    ...objState, state: nextState.id,
    planted_at: ci === 0 ? Date.now() : objState.planted_at
  };
  if (ix.reward) giveReward(ix.reward);
  giveXP(XP_REWARDS.grow, 'grow');
  savePlayer();
  const map = world.maps.find(m=>m.id===currentMapId);
  renderObjects(map);
  showToast(`${entity.name} → ${nextState.label||nextState.id}`);
}

function doPlant(obj, entity, ix) {
  // Check place_requires
  const unmet = (entity.place_requires||[]).find(rid => !hasItemInInventory(rid));
  if (unmet) {
    const req = world.entities?.find(e=>e.id===unmet);
    showToast(`Need ${req?.name||'required tool'} to plant`, 'error'); return;
  }
  doGrow(obj, entity, ix);
  giveXP(XP_REWARDS.plant - XP_REWARDS.grow, 'plant');
}

function doHarvest(obj, entity, ix) {
  if (!player.map_states[currentMapId]) player.map_states[currentMapId] = {};
  const objState = player.map_states[currentMapId][obj.id] || {};
  const states = entity.states||[{id:'idle'}];
  const lastState = states[states.length-1];
  const currentState = objState.state||obj.state||states[0].id;
  if (currentState !== lastState.id) {
    showToast(`${entity.name} isn't ready to harvest yet`,'error'); return;
  }
  if (ix.reward) giveReward(ix.reward);
  // Reset to first state if respawning
  player.map_states[currentMapId][obj.id] = {
    ...objState,
    state: entity.respawn ? states[0].id : 'harvested',
    collected: !entity.respawn,
    respawn_at: entity.respawn ? Date.now() + (entity.respawn_hours||24)*3600000 : null
  };
  giveXP(XP_REWARDS.harvest, 'harvest');
  savePlayer();
  const map = world.maps.find(m=>m.id===currentMapId);
  renderObjects(map);
  showToast(`Harvested ${entity.name}`);
}

function doReveal(obj, entity, ix) {
  if (!player.map_states[currentMapId]) player.map_states[currentMapId] = {};
  player.map_states[currentMapId][obj.id] = {
    ...player.map_states[currentMapId][obj.id], state:'found'
  };
  if (ix.reward) giveReward(ix.reward);
  giveXP(XP_REWARDS.collect+5, 'reveal');
  savePlayer();
  const map = world.maps.find(m=>m.id===currentMapId);
  renderObjects(map);
  showToast(`Discovered: ${entity.name}!`);
}

function doTransform(obj, entity, ix) {
  if (!player.map_states[currentMapId]) player.map_states[currentMapId] = {};
  const states = entity.states||[{id:'idle'}];
  const objState = player.map_states[currentMapId][obj.id] || {};
  const ci = states.findIndex(s=>s.id===(objState.state||obj.state||states[0].id));
  const next = states[Math.min(ci+1,states.length-1)];
  player.map_states[currentMapId][obj.id] = {...objState, state:next.id};
  if (ix.reward) giveReward(ix.reward);
  giveXP(10, 'transform');
  savePlayer();
  const map = world.maps.find(m=>m.id===currentMapId);
  renderObjects(map);
  showToast(`${entity.name} transformed to ${next.label||next.id}`);
}

function doReward(obj, entity, ix) {
  if (ix.reward) giveReward(ix.reward);
  giveXP(10, 'reward');
  showToast(`Reward: ${ix.reward||'nothing'}`);
}

// ══════════════════════════════════════════════════════
// DIALOG SYSTEM
// ══════════════════════════════════════════════════════
let dialogStack = [];

function openDialog(dialogId, obj) {
  const dlg = world.dialogs?.find(d=>d.id===dialogId);
  if (!dlg) { showToast('Dialog not found','error'); return; }
  dialogStack = [];
  showDialogNode(dlg, dlg.start_node);
}

function showDialogNode(dlg, nodeId) {
  const node = dlg.nodes.find(n=>n.id===nodeId);
  if (!node) { closeDialog(); return; }

  const box = document.getElementById('dialogBox');
  box.classList.add('open');

  let html = '';
  if (node.speaker) html += `<div class="dialog-speaker">${node.speaker}</div>`;
  html += `<div class="dialog-text">${node.text||''}</div>`;

  if (node.choices?.length) {
    html += `<div class="dialog-choices">`;
    node.choices.forEach(c => {
      html += `<button class="dialog-choice" onclick="onDialogChoice('${dlg.id}','${c.next||''}','${c.reward||''}')">
        ${c.text}
      </button>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="dialog-choices">
      <button class="dialog-choice" onclick="closeDialog()">Continue…</button>
    </div>`;
  }

  box.innerHTML = html;
  giveXP(XP_REWARDS.dialog, 'dialog');
}

function onDialogChoice(dialogId, nextNodeId, reward) {
  if (reward) giveReward(reward);
  if (!nextNodeId) { closeDialog(); return; }
  const dlg = world.dialogs?.find(d=>d.id===dialogId);
  if (dlg) showDialogNode(dlg, nextNodeId);
  else closeDialog();
}

function closeDialog() {
  const box = document.getElementById('dialogBox');
  box.classList.remove('open');
  box.innerHTML = '';
}

// ══════════════════════════════════════════════════════
// INVENTORY & XP
// ══════════════════════════════════════════════════════
function hasItemInInventory(entityId) {
  return (player.inventory||[]).some(i=>i.entity_id===entityId && i.quantity>0);
}

function addToInventory(entityId, qty) {
  if (!entityId) return;
  const slot = player.inventory.find(i=>i.entity_id===entityId);
  if (slot) slot.quantity += qty;
  else player.inventory.push({entity_id:entityId, quantity:qty});
  updateInventoryUI();
}

function giveReward(rewardStr) {
  if (!rewardStr) return;
  // Try to match entity name or id
  const entity = world.entities?.find(e =>
    e.id === rewardStr || e.name.toLowerCase() === rewardStr.toLowerCase()
  );
  if (entity) { addToInventory(entity.id, 1); showToast(`+1 ${entity.name}`,'xp'); }
  else if (rewardStr.match(/^\d+_coins$/)) {
    showToast(`+${rewardStr.replace('_coins','')} 🪙`,'xp');
  }
}

function giveXP(amount, type) {
  if (!amount) return;
  player.xp = (player.xp||0) + amount;
  const xpForNext = player.level * XP_PER_LEVEL;
  if (player.xp >= xpForNext) {
    player.xp -= xpForNext;
    player.level = (player.level||1) + 1;
    showToast(`🎉 Level up! Now level ${player.level}`,'xp');
  }
  savePlayer();
  updateHUD();
}

// ══════════════════════════════════════════════════════
// GROW TIMERS
// ══════════════════════════════════════════════════════
function startGrowTimer() {
  if (growTimerInterval) clearInterval(growTimerInterval);
  growTimerInterval = setInterval(tickGrowTimers, 10000); // every 10s
  tickGrowTimers();
}

function tickGrowTimers() {
  if (!world || !currentMapId) return;
  const map = world.maps.find(m=>m.id===currentMapId);
  if (!map) return;
  const objStates = player.map_states[currentMapId] || {};
  let changed = false;

  map.objects.forEach(obj => {
    const entity = world.entities?.find(e=>e.id===obj.entity_id);
    if (!entity || !entity.grow_time_hours) return;
    const os = objStates[obj.id];
    if (!os?.planted_at) return;
    const growMs = entity.grow_time_hours * 3600000 / (entity.growth_speed_multiplier||1);
    if (Date.now() - os.planted_at >= growMs) {
      const states = entity.states||[{id:'idle'}];
      const ci = states.findIndex(s=>s.id===os.state);
      if (ci < states.length - 1) {
        player.map_states[currentMapId][obj.id] = {...os, state:states[ci+1].id, planted_at:Date.now()};
        changed = true;
        showToast(`${entity.name} grew to ${states[ci+1].label||states[ci+1].id}`);
      }
    }

    // Check respawn
    if (os.respawn_at && Date.now() >= os.respawn_at) {
      const states = entity.states||[{id:'idle'}];
      player.map_states[currentMapId][obj.id] = {state:states[0].id, collected:false, respawn_at:null};
      changed = true;
    }
  });

  if (changed) { savePlayer(); renderObjects(map); }

  // Update grow badges
  document.querySelectorAll('.grow-badge').forEach(badge => {
    const plantedAt = parseInt(badge.dataset.plantedAt);
    const growMs = parseInt(badge.dataset.growMs);
    const remain = growMs - (Date.now() - plantedAt);
    if (remain > 0) badge.textContent = formatDuration(remain);
    else badge.textContent = 'Ready!';
  });
}

function formatDuration(ms) {
  if (ms <= 0) return 'Ready!';
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

// ══════════════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════════════
function updateHUD() {
  // Player
  document.getElementById('hudPlayerName').textContent = player.name;
  const xpNeeded = player.level * XP_PER_LEVEL;
  document.getElementById('hudLevel').textContent = `LVL ${player.level} · ${player.xp}/${xpNeeded} XP`;
  document.getElementById('xpBar').style.width = (player.xp / xpNeeded * 100) + '%';

  // Map
  const map = world?.maps?.find(m=>m.id===currentMapId);
  if (map) {
    document.getElementById('hudMapName').textContent = map.name;
    document.getElementById('hudMapMeta').textContent = `Zone ${map.zone} · ${map.type}`;
    document.getElementById('blightBar').style.width = (map.blight_level||0) + '%';
  }

  updateInventoryUI();
}

function updateInventoryUI() {
  const container = document.getElementById('invSlots');
  const inv = player.inventory?.filter(i=>i.quantity>0) || [];

  if (!inv.length) {
    container.innerHTML = '<div class="inv-empty">Empty</div>';
    return;
  }

  container.innerHTML = inv.map(slot => {
    const entity = world.entities?.find(e=>e.id===slot.entity_id);
    if (!entity) return '';
    const visual = entity.sprite
      ? `<img class="inv-slot-img" src="${entity.sprite}" draggable="false">`
      : `<div class="inv-slot-icon">${CATEGORY_ICONS[entity.category]||'📦'}</div>`;
    return `<div class="inv-slot" title="${entity.name}" onclick="selectInventoryItem('${slot.entity_id}')">
      ${visual}
      <div class="inv-slot-name">${entity.name}</div>
      ${slot.quantity>1?`<div class="inv-slot-qty">×${slot.quantity}</div>`:''}
    </div>`;
  }).join('');
}

function selectInventoryItem(entityId) {
  document.querySelectorAll('.inv-slot').forEach(s => s.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const entity = world.entities?.find(e=>e.id===entityId);
  if (entity) showToast(`Selected: ${entity.name}`);
}

// ══════════════════════════════════════════════════════
// TOGGLES
// ══════════════════════════════════════════════════════
function toggleLabels() {
  showLabels = !showLabels;
  document.querySelectorAll('.obj-label').forEach(el => {
    el.textContent = showLabels ? el.dataset.label || el.textContent : '';
  });
  const map = world.maps.find(m=>m.id===currentMapId);
  if (map) renderObjects(map);
}

function toggleMasks() {
  showMasksOverlay = !showMasksOverlay;
  const map = world.maps.find(m=>m.id===currentMapId);
  if (map) renderMaskOverlay(map);
  showToast(showMasksOverlay ? 'Masks visible' : 'Masks hidden');
}

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════════
// RESIZE
// ══════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const map = world?.maps?.find(m=>m.id===currentMapId);
  if (map) { renderObjects(map); renderMaskOverlay(map); }
});

// ══════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════
init();
</script>
</body>
</html>
